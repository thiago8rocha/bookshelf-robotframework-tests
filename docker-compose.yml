services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bookshelf_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test123
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ${BOOKSHELF_API_PATH:-../bookshelf-api}/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d bookshelf_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ${BOOKSHELF_API_PATH:-../bookshelf-api}
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=test
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USER=test
      - DB_PASSWORD=test123
      - DB_NAME=bookshelf_test
      - JWT_SECRET=ci_testing_secret_key_minimum_32_characters_long
      - CORS_ORIGIN=http://localhost:5173,http://frontend:5173,http://localhost:3000,http://backend:3000
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ${BOOKSHELF_FRONTEND_PATH:-../bookshelf-frontend}
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    environment:
      - VITE_API_URL=http://backend:3000
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5173 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy

  robot:
    build:
      context: .
      dockerfile: Dockerfile
    # Volume de resultados — presente apenas quando a variável RESULTS_VOLUME estiver definida.
    # Local: o Makefile seta RESULTS_VOLUME=./results:/app/results automaticamente.
    # CI: a variável não é definida, então nenhum volume é montado.
    volumes:
      - ${RESULTS_VOLUME:-/dev/null:/dev/null.ignore}
    environment:
      - BROWSER=chromium
      - BASE_URL=http://frontend:5173
      - API_URL=http://backend:3000
    depends_on:
      frontend:
        condition: service_healthy
