name: Robot Framework Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

  # ── Disparo manual pelo GitHub UI ──────────────────────────────────────────
  workflow_dispatch:
    inputs:
      test_suite:
        description: "Which suite to run?"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - all-full
          - api
          - ui
          - e2e
          - performance
          - performance-full
          - smoke
          - regression
          - fresh-user
          - negative
      extra_args:
        description: "Extra Robot arguments (e.g: --include login)"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: ${{ github.event.inputs.test_suite || 'all' }}
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout dos repositórios ─────────────────────────────────────
      - name: Checkout Robot Tests
        uses: actions/checkout@v4

      - name: Checkout bookshelf-api
        uses: actions/checkout@v4
        with:
          repository: thiago8rocha/bookshelf-api
          path: bookshelf-api

      - name: Checkout bookshelf-frontend
        uses: actions/checkout@v4
        with:
          repository: thiago8rocha/bookshelf-frontend
          path: bookshelf-frontend

      # ── 2. Determinar argumentos do Robot ─────────────────────────────────
      - name: Resolve Robot arguments
        id: robot_args
        run: |
          SUITE="${{ github.event.inputs.test_suite || 'all' }}"
          EXTRA="${{ github.event.inputs.extra_args }}"

          case "$SUITE" in
            all)              ARGS="--exclude stress --exclude slow tests" ;;
            all-full)         ARGS="tests" ;;
            api)              ARGS="tests/api" ;;
            ui)               ARGS="tests/ui" ;;
            e2e)              ARGS="tests/e2e" ;;
            performance)      ARGS="--exclude slow --exclude stress tests/performance" ;;
            performance-full) ARGS="tests/performance" ;;
            smoke)            ARGS="--include smoke tests" ;;
            regression)       ARGS="--include regression tests" ;;
            fresh-user)       ARGS="--include fresh-user tests" ;;
            negative)         ARGS="--include negative tests" ;;
            *)                ARGS="--exclude stress --exclude slow tests" ;;
          esac

          if [ -n "$EXTRA" ]; then
            ARGS="$ARGS $EXTRA"
          fi

          echo "args=$ARGS" >> $GITHUB_OUTPUT
          echo "Robot args: $ARGS"

      # ── 3. Subir a aplicação ──────────────────────────────────────────────
      - name: Start application services
        env:
          BOOKSHELF_API_PATH: ${{ github.workspace }}/bookshelf-api
          BOOKSHELF_FRONTEND_PATH: ${{ github.workspace }}/bookshelf-frontend
          RESULTS_PATH: ${{ github.workspace }}/robot-results
        run: |
          mkdir -p ${{ github.workspace }}/robot-results
          docker compose -f docker-compose.yml up -d --build database backend frontend

      # ── 4. Aguardar healthchecks ──────────────────────────────────────────
      - name: Wait for services to be healthy
        run: |
          for i in $(seq 1 30); do
            HEALTHY=$(docker compose -f docker-compose.yml ps | grep -c "healthy" || true)
            echo "Servicos saudaveis: $HEALTHY (tentativa $i/30)"
            if [ "$HEALTHY" -ge 3 ]; then
              echo "Todos os servicos prontos!"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Timeout aguardando healthchecks"
              docker compose -f docker-compose.yml logs
              exit 1
            fi
            sleep 5
          done

      # ── 5. Build da imagem Robot ──────────────────────────────────────────
      - name: Build Robot image
        env:
          BOOKSHELF_API_PATH: ${{ github.workspace }}/bookshelf-api
          BOOKSHELF_FRONTEND_PATH: ${{ github.workspace }}/bookshelf-frontend
          RESULTS_PATH: ${{ github.workspace }}/robot-results
        run: docker compose -f docker-compose.yml build robot

      # ── 6. Criar pasta de resultados Allure ──────────────────────────────
      - name: Create results directory
        run: mkdir -p allure-results

      # ── 7. Executar testes ─────────────────────────────────────────────────
      - name: Run Robot Framework tests
        id: run_tests
        env:
          BOOKSHELF_API_PATH: ${{ github.workspace }}/bookshelf-api
          BOOKSHELF_FRONTEND_PATH: ${{ github.workspace }}/bookshelf-frontend
          RESULTS_PATH: ${{ github.workspace }}/robot-results
        run: |
          docker compose -f docker-compose.yml run --rm \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            robot \
            python -m robot \
              --listener allure_robotframework:/app/allure-results \
              --outputdir /app/results \
              --output output.xml \
              --log log.html \
              --report report.html \
              ${{ steps.robot_args.outputs.args }}
        continue-on-error: true

      # ── 8. Sumario no GitHub ──────────────────────────────────────────────
      - name: Test Report Summary
        if: always()
        run: |
          echo "## Resultados dos Testes" >> $GITHUB_STEP_SUMMARY
          if [ -f robot-results/output.xml ]; then
            python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('robot-results/output.xml')
          stats = tree.find('.//statistics/total/stat')
          passed = stats.get('pass', '0')
          failed = stats.get('fail', '0')
          skipped = stats.get('skip', '0')
          total = int(passed) + int(failed) + int(skipped)
          print(f'| Total | Passou | Falhou | Pulou |')
          print(f'|---|---|---|---|')
          print(f'| {total} | {passed} | {failed} | {skipped} |')
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "Arquivo de resultados nao encontrado" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 9. Instalar Allure CLI (Node.js — sem Java) ───────────────────────
      - name: Install Allure CLI
        if: always()
        run: npm install -g allure@latest

      # ── 10. Gerar relatorio Allure ─────────────────────────────────────────
      - name: Generate Allure report
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            npx allure generate --output allure-report allure-results
            echo "Allure report generated successfully"
          else
            echo "No Allure results found"
            mkdir -p allure-report
          fi
        continue-on-error: true

      # ── 11. Deploy do Allure para GitHub Pages ─────────────────────────────
      - name: Deploy Allure report to GitHub Pages
        if: always() && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          destination_dir: allure-report

      # ── 12. Artefatos ──────────────────────────────────────────────────────
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload Robot HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-html-report
          path: robot-results/
          retention-days: 14

      # ── 13. Criar Issue em caso de falha ──────────────────────────────────
      - name: Create Issue on failure
        if: steps.run_tests.outcome == 'failure' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Tests Failed — ${new Date().toLocaleDateString('pt-BR')}`,
              body: `Testes falharam em \`${new Date().toISOString()}\`\n\n**Suite:** ${{ github.event.inputs.test_suite || 'all' }}\n**Execucao:** [Ver no GitHub Actions](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n**Relatorio Allure:** https://thiago8rocha.github.io/bookshelf-robotframework-tests/allure-report/\n\nVerifique os artefatos da execucao para detalhes.`,
              labels: ['bug', 'automated-test']
            })

      # ── 14. Mostrar URL do relatorio ───────────────────────────────────────
      - name: Report URL
        if: always() && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: |
          echo "Allure Report: https://thiago8rocha.github.io/bookshelf-robotframework-tests/allure-report/"

      # ── 15. Cleanup ────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        env:
          BOOKSHELF_API_PATH: ${{ github.workspace }}/bookshelf-api
          BOOKSHELF_FRONTEND_PATH: ${{ github.workspace }}/bookshelf-frontend
          RESULTS_PATH: ${{ github.workspace }}/robot-results
        run: docker compose -f docker-compose.yml down -v

      # ── 16. Falhar o job se os testes falharam ─────────────────────────────
      - name: Fail if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
